name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "server/**"
      - "api/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "server/**"
      - "api/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect backend layout
    runs-on: ubuntu-latest
    outputs:
      backend_dir: ${{ steps.detect.outputs.backend_dir }}
      runtime: ${{ steps.detect.outputs.runtime }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect backend directory and runtime
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          backend_dir=""
          for dir in backend server api; do
            if [ -d "$dir" ]; then
              backend_dir="$dir"
              break
            fi
          done

          if [ -z "$backend_dir" ]; then
            echo "backend_dir=" >> "$GITHUB_OUTPUT"
            echo "runtime=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "backend_dir=$backend_dir" >> "$GITHUB_OUTPUT"

          if [ -f "$backend_dir/package.json" ]; then
            echo "runtime=node" >> "$GITHUB_OUTPUT"
          elif [ -f "$backend_dir/pyproject.toml" ] || [ -f "$backend_dir/requirements.txt" ] || [ -f "$backend_dir/requirements-dev.txt" ]; then
            echo "runtime=python" >> "$GITHUB_OUTPUT"
          else
            echo "runtime=unsupported" >> "$GITHUB_OUTPUT"
          fi

  node:
    name: Node backend checks
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.runtime == 'node' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ needs.detect.outputs.backend_dir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  python:
    name: Python backend checks
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.runtime == 'python' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ needs.detect.outputs.backend_dir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ${{ needs.detect.outputs.backend_dir }}/requirements*.txt
            ${{ needs.detect.outputs.backend_dir }}/pyproject.toml
            ${{ needs.detect.outputs.backend_dir }}/poetry.lock

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          if [ -f poetry.lock ]; then
            pip install poetry
            poetry install --no-interaction
          elif [ -f pyproject.toml ]; then
            pip install build
            pip install -e .
          fi

      - name: Lint
        run: |
          set -euo pipefail
          if python - <<'PY'
          import importlib.util, sys
          sys.exit(0 if importlib.util.find_spec("ruff") else 1)
          PY
          then
            python -m ruff check .
          elif python - <<'PY'
          import importlib.util, sys
          sys.exit(0 if importlib.util.find_spec("flake8") else 1)
          PY
          then
            python -m flake8 .
          else
            echo "No Python linter installed in backend environment; skipping."
          fi

      - name: Test
        run: |
          set -euo pipefail
          if python - <<'PY'
          import importlib.util, sys
          sys.exit(0 if importlib.util.find_spec("pytest") else 1)
          PY
          then
            python -m pytest
          elif [ -d tests ]; then
            python -m unittest discover -s tests
          else
            echo "No Python tests detected; skipping."
          fi

      - name: Build
        if: ${{ hashFiles(format('{0}/pyproject.toml', needs.detect.outputs.backend_dir)) != '' }}
        run: python -m build

  unsupported:
    name: Unsupported backend layout
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.runtime == 'unsupported' }}

    steps:
      - name: Fail for unsupported backend layout
        run: |
          echo "Detected backend directory '${{ needs.detect.outputs.backend_dir }}' but no supported Node.js or Python manifest."
          exit 1

  no-backend:
    name: No backend directory present
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.runtime == 'none' }}

    steps:
      - name: Skip cleanly
        run: echo "No backend/ server/ or api/ directory is committed in this repository yet."
