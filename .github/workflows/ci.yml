name: CI Pipeline (Lighthouse & Axe Audits)

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "styles/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "e2e/**"
      - "scripts/run-audits.js"
      - ".github/workflows/ci.yml"

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lighthouse & Axe Audits
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js App
        run: pnpm run build

      - name: Install Playwright Browsers & Deps
        run: npx playwright install --with-deps

      - name: Start Preview Server
        run: |
          pnpm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests (Axe Checks)
        run: npx playwright test

      - name: Run Lighthouse Audits
        run: node scripts/run-audits.js

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.cwd(), 'lighthouse-report.md');
            
            if (fs.existsSync(reportPath)) {
              const body = fs.readFileSync(reportPath, 'utf8');
              
              // Find if there is an existing comment from the bot
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botComment = comments.find(comment => 
                comment.user.type === 'Bot' && comment.body.includes('⚡ Lighthouse & Axe Audit Results')
              );
              
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body,
                });
              }
            } else {
              console.log('No report file found to comment.');
            }
