name: Legacy Term Guard

on:
  pull_request:
    paths:
      - "**/*"
      - ".github/workflows/legacy-terms-check.yml"
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  check-legacy-terms:
    name: Check legacy product terms
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run legacy term guard
        run: pnpm run check:terms
