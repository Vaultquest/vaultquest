name: Frontend CI

on:
  pull_request:
    paths:
      - "stellar-wallet-connect/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "stellar-wallet-connect/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-wallet-connect

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stellar-wallet-connect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
